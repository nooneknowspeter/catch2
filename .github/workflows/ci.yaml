name: Continuous Integration

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        zig-version: [master]
        os: [ubuntu-latest, macos-latest, windows-latest]
        run_tests: [true]
        include:
          - zig-version: "0.16.0"
            os: ubuntu-latest
            run_tests: false
          - zig-version: "0.15.2"
            os: ubuntu-latest
            run_tests: false
          - zig-version: "0.14.1"
            os: ubuntu-latest
            run_tests: true

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ matrix.zig-version }}

      - name: Build
        run: zig build --summary new

      - if: ${{ matrix.run_tests }}
        name: Run tests
        run: zig build test --summary new

      - name: Build & Run example tests
        working-directory: example
        run: zig build test --summary new
